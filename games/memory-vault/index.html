<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>기억의 금고</title>
<style>
:root{--bg:#0b0f15;--panel:#111722;--text:#f1f5fb;--muted:#aeb8c7}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -20%,#29334a,#141a24 40%,#0b0f15 78%);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif}
body{display:flex;justify-content:center;padding:14px}.app{width:min(1240px,100%)}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(145deg,#ead79a,#ac8447);box-shadow:0 10px 30px #0008;font-size:28px}
h1{margin:0;font-size:clamp(21px,3vw,31px);letter-spacing:-.04em}.sub{font-size:13px;color:var(--muted);margin-top:4px}.small-btn{padding:10px 13px;border-radius:12px;background:#202938;border:1px solid #ffffff18;color:#fff;font-weight:850;cursor:pointer}
.shell{position:relative;overflow:hidden;border-radius:24px;background:#0e141e;border:1px solid #ffffff14;box-shadow:0 30px 90px #000a}canvas{display:block;width:100%;aspect-ratio:16/9}
.hud{position:absolute;left:14px;right:14px;top:14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.card{background:#0f1521dc;border:1px solid #ffffff24;backdrop-filter:blur(11px);border-radius:16px;padding:10px 14px;box-shadow:0 10px 32px #0005}
.kicker{font-size:11px;font-weight:850;color:#c6d1de}.big{font-size:clamp(16px,2.5vw,24px);font-weight:1000;margin-top:3px}.meta{font-size:12px;color:#b6c2d1;margin-top:6px}#timer{font-size:clamp(24px,3vw,38px);font-weight:1000;font-variant-numeric:tabular-nums}
.progress{height:6px;width:min(320px,36vw);margin-top:7px;background:#ffffff18;border-radius:999px;overflow:hidden}.progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#dcc28c,#8dc3ff)}
.overlay{position:absolute;inset:0;padding:18px;display:grid;place-items:center;background:linear-gradient(#07101a55,#07101ad1);transition:.2s}.overlay.memory-lock{background:linear-gradient(rgba(2,5,9,.82),rgba(1,3,7,.92))}.overlay.hidden{opacity:0;pointer-events:none}
.modal{width:min(720px,96%);max-height:92%;overflow:auto;padding:clamp(22px,4vw,38px);text-align:center;border-radius:26px;background:linear-gradient(145deg,#1a2230f2,#0f1521f5);border:1px solid #ffffff24;box-shadow:0 32px 100px #000b;backdrop-filter:blur(18px)}
.badge{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;background:#ffffff10;border:1px solid #ffffff18;font-size:12px;font-weight:900}.modal h2{font-size:clamp(28px,5vw,46px);line-height:1.12;margin:14px 0 9px;letter-spacing:-.05em}.modal p{max-width:540px;margin:0 auto;color:#b7c3d1;line-height:1.65}
.primary,.answer,.opt{border:0;font:inherit;cursor:pointer;font-weight:900}.primary{margin-top:22px;padding:15px 24px;border-radius:15px;background:linear-gradient(145deg,#ead7a1,#bf9959);color:#2b2010;box-shadow:0 12px 30px #d7b27330}
.answers{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px}.answer{padding:14px 8px;border-radius:14px;background:#273448;color:#fff;border:1px solid #ffffff16}.answer.correct,.opt.correct{background:#208b5c}.answer.wrong,.opt.wrong{background:#bd4a54}
.option-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:22px}.opt{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:#253145;color:#fff;border:1px solid #ffffff18;text-align:left}.opt img{width:58px;height:58px;object-fit:contain;filter:drop-shadow(0 5px 12px #0008)}
.result-card{margin-top:18px;padding:18px;border-radius:18px;background:#0c131d;border:1px solid #ffffff14;text-align:left}.row{display:flex;justify-content:space-between;gap:15px;padding:8px 0;border-bottom:1px dashed #ffffff14}.row:last-child{border-bottom:0}.row span{color:#aab6c5}
.footer{display:flex;justify-content:space-between;gap:12px;color:#7f8ca0;font-size:12px;padding:12px 4px 0}.notice{margin-top:14px;padding:14px;border-radius:14px;background:#0f1620;border:1px solid #ffffff12;color:#d2dbe7}
@media(max-width:720px){body{padding:7px}.shell{border-radius:17px}.hud{left:7px;right:7px;top:7px}.card{padding:8px 10px;border-radius:11px}.answers{grid-template-columns:repeat(2,1fr)}.option-grid{grid-template-columns:1fr}header .small-btn{display:none}.footer{justify-content:center}.footer span:last-child{display:none}}
</style>
</head>
<body>
<div class="app">
<header><div class="brand"><div class="logo">🪙</div><div><h1>기억의 금고</h1><div class="sub">Noru Lab · 코인 관찰 미니게임</div></div></div><button class="small-btn" id="soundBtn">🔊 효과음 켜짐</button></header>
<section class="shell">
<canvas id="game" width="1280" height="720"></canvas>
<div class="hud"><div class="card"><div class="kicker" id="stageLabel">STAGE 1</div><div class="big" id="promptLabel">관찰 개시</div><div class="meta" id="difficultyLabel">쉬움 구간</div><div class="progress"><i id="progressBar"></i></div></div><div class="card"><div id="timer">준비</div></div></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
</section>
<div class="footer"><span>개수 맞히기 + 존재 여부 판별</span><span>자체 제작 마법 보관실 배경</span></div>
</div>
<script>
const ITEMS=[{"file": "coin_cadena_emblem.png", "name": "카데나 성표"}, {"file": "coin_glory_seal.png", "name": "영광의 인장"}, {"file": "coin_gold.png", "name": "골드"}, {"file": "coin_guild_dungeon_barrier_stone.png", "name": "결사던전 결계석"}, {"file": "coin_hero_token.png", "name": "영웅증표"}, {"file": "coin_legend_token.png", "name": "전설증표"}, {"file": "coin_mythic_token.png", "name": "신화증표"}, {"file": "coin_rare_token.png", "name": "희귀증표"}, {"file": "coin_revival_token.png", "name": "부활의 증표"}, {"file": "coin_sun_token.png", "name": "태양의 증표"}];
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),modal=document.getElementById('modal');
const timerEl=document.getElementById('timer'),stageLabel=document.getElementById('stageLabel'),promptLabel=document.getElementById('promptLabel'),difficultyLabel=document.getElementById('difficultyLabel'),progressBar=document.getElementById('progressBar');
const images={},obsImages={};
ITEMS.forEach(it=>{const i=new Image();i.src='assets/items/'+it.file;images[it.file]=i});
[['crate','crate_small.png'],['chest','chest_large.png'],['magic','magic_effect.png']].forEach(([k,f])=>{const i=new Image();i.src='assets/obstacles/'+f;obsImages[k]=i});
let stage=1,mistakes=0,state='intro',observeStart=0,last=performance.now(),sound=true,sprites=[],obstacles=[],currentRound=null,audioCtx;
const rnd=(a,b)=>a+Math.random()*(b-a),rndi=(a,b)=>Math.floor(rnd(a,b+1)),pick=a=>a[rndi(0,a.length-1)],shuffle=a=>[...a].sort(()=>Math.random()-.5),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const finalStage=()=>mistakes===0?18:15, sectionLabel=()=>stage<=3?'쉬움 구간':stage<=7?'보통 구간':'어려움 구간';
function beep(f=500,d=.08,type='sine'){if(!sound)return;audioCtx||=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(.05,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
document.getElementById('soundBtn').onclick=e=>{sound=!sound;e.currentTarget.textContent=sound?'🔊 효과음 켜짐':'🔇 효과음 꺼짐'};
function cfg(){if(stage<=3)return{time:6.5-stage*.18,total:12+stage*2,unique:4,obs:0,magic:0,speed:.82,minDist:70};if(stage<=7)return{time:5.8-(stage-4)*.17,total:19+(stage-4)*2,unique:5+(stage>5),obs:1,magic:stage>=6?1:0,speed:1,minDist:62};return{time:Math.max(4,5-(stage-8)*.07),total:27+Math.min(13,(stage-8)*2),unique:7+Math.floor((stage-8)/4),obs:2+Math.floor((stage-8)/5),magic:1+Math.floor((stage-8)/6),speed:1.16+Math.min(.28,(stage-8)*.02),minDist:55}}
function intro(){state='intro';overlay.classList.remove('memory-lock');overlay.classList.remove('hidden');timerEl.textContent='준비';modal.innerHTML=`<div class="badge">🪙 기억의 금고</div><h2>흩뿌려진 코인을<br>기억하십시오</h2><p>특정 코인의 개수를 맞히거나, 등장하지 않은 코인을 식별하십시오.</p><div class="notice">코인은 상자 뒤나 마법 효과에 잠시 가려질 수 있지만, 끝까지 완전히 숨지는 않습니다.</div><button class="primary" id="startBtn">관찰 시작</button>`;document.getElementById('startBtn').onclick=()=>{stage=1;mistakes=0;startStage()}}
function makeSprite(item,i){const lane=i%6;return{item,x:rnd(80,1200),y:405+lane*44+rnd(-12,12),vx:rnd(.95,1.65),dir:Math.random()<.5?-1:1,scale:rnd(.58,.79),rot:rnd(0,6.28),vr:rnd(-.014,.014),phase:rnd(0,6.28),turn:rnd(1,3)}}
function spreadInitial(minDist){for(let iter=0;iter<60;iter++){for(let i=0;i<sprites.length;i++){for(let j=i+1;j<sprites.length;j++){const a=sprites[i],b=sprites[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;if(d<minDist){const push=(minDist-d)*.48,nx=dx/d,ny=dy/d;a.x-=nx*push;b.x+=nx*push;a.y-=ny*push*.35;b.y+=ny*push*.35}}}}}
function buildRound(){const c=cfg(),mode=stage<=2?'count':(Math.random()<.65?'count':'exist'),pool=shuffle(ITEMS).slice(0,Math.min(c.unique,ITEMS.length));sprites=[];obstacles=[];
for(let i=0;i<c.obs;i++)obstacles.push({type:i%2?'chest':'crate',x:rnd(180,1030),y:rnd(440,555),w:i%2?150:108,h:i%2?120:92});
for(let i=0;i<c.magic;i++)obstacles.push({type:'magic',x:rnd(180,1040),y:rnd(400,545),w:138,h:138,phase:rnd(0,6.28)});
if(mode==='count'){const target=pick(pool),desired=rndi(3,Math.max(5,Math.floor(c.total*.24)));for(let i=0;i<c.total;i++){const item=i<desired?target:pick(pool.filter(p=>p.file!==target.file));sprites.push(makeSprite(item,i))}currentRound={mode,target,answer:desired}}
else{const present=shuffle(pool).slice(0,Math.min(3,pool.length)),absent=pick(ITEMS.filter(it=>!present.find(p=>p.file===it.file)));for(let i=0;i<c.total;i++)sprites.push(makeSprite(pick(present),i));currentRound={mode,options:shuffle([...present,absent]),answer:absent.file}}
spreadInitial(c.minDist)}
function startStage(){buildRound();state='observe';observeStart=performance.now();overlay.classList.remove('memory-lock');overlay.classList.add('hidden');stageLabel.textContent=`STAGE ${stage} · ${currentRound.mode==='count'?'수량 판별':'존재 판별'}`;difficultyLabel.textContent=sectionLabel();promptLabel.textContent=currentRound.mode==='count'?`${currentRound.target.name} 수를 기억하십시오`:'등장하지 않은 코인을 식별하십시오';progressBar.style.width=`${stage/finalStage()*100}%`;beep(660,.1)}
function ask(){state='question';overlay.classList.remove('hidden');overlay.classList.toggle('memory-lock',currentRound.mode==='exist');beep(350,.14,'triangle');if(currentRound.mode==='count'){const set=new Set([currentRound.answer]);while(set.size<4)set.add(clamp(currentRound.answer+rndi(-3,3),1,50));const arr=shuffle([...set]);modal.innerHTML=`<div class="badge">🪙 STAGE ${stage} · 수량 판별</div><h2>${currentRound.target.name}는<br>몇 개였습니까?</h2><img src="assets/items/${currentRound.target.file}" style="width:88px;height:88px;object-fit:contain"><div class="answers">${arr.map(n=>`<button class="answer" data-v="${n}">${n}개</button>`).join('')}</div>`;modal.querySelectorAll('.answer').forEach(b=>b.onclick=()=>judgeCount(+b.dataset.v,b))}else{modal.innerHTML=`<div class="badge">🪙 STAGE ${stage} · 존재 판별</div><h2>등장하지 않은 코인은?</h2><p>관찰 구간에서 보지 못한 코인을 선택하십시오.</p><div class="option-grid">${currentRound.options.map(it=>`<button class="opt" data-file="${it.file}"><img src="assets/items/${it.file}"><span>${it.name}</span></button>`).join('')}</div>`;modal.querySelectorAll('.opt').forEach(b=>b.onclick=()=>judgeExist(b.dataset.file,b))}}
function after(ok,detail){if(stage>=finalStage())return finish();modal.innerHTML=`<div class="badge">${ok?'✅ 정답':'⚠️ 오답'}</div><h2>${ok?'정확합니다':'기억이 흐트러졌습니다'}</h2><p>${detail}</p><button class="primary" id="nextBtn">다음 단계</button>`;document.getElementById('nextBtn').onclick=()=>{stage++;startStage()}}
function judgeCount(v,b){if(state!=='question')return;state='result';const ok=v===currentRound.answer;modal.querySelectorAll('.answer').forEach(x=>{x.disabled=true;if(+x.dataset.v===currentRound.answer)x.classList.add('correct')});if(!ok){mistakes++;b.classList.add('wrong');beep(180,.22,'sawtooth')}else{beep(720,.09);setTimeout(()=>beep(920,.12),80)}setTimeout(()=>after(ok,ok?'수량을 정확히 판별했습니다.':`정답은 ${currentRound.answer}개였습니다. 현재 오답 ${mistakes}회.`),550)}
function judgeExist(f,b){if(state!=='question')return;state='result';const ok=f===currentRound.answer;modal.querySelectorAll('.opt').forEach(x=>{x.disabled=true;if(x.dataset.file===currentRound.answer)x.classList.add('correct')});if(!ok){mistakes++;b.classList.add('wrong');beep(180,.22,'sawtooth')}else{beep(720,.09);setTimeout(()=>beep(920,.12),80)}const nm=ITEMS.find(x=>x.file===currentRound.answer).name;setTimeout(()=>after(ok,ok?'존재 여부를 정확히 판별했습니다.':`정답은 "${nm}"였습니다. 현재 오답 ${mistakes}회.`),550)}
function finish(){state='finished';const perfect=mistakes===0,max=perfect?18:15,n=new Date(),time=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;modal.innerHTML=`<div class="badge">${perfect?'🏆 PERFECT CLEAR':'🎖️ CLEAR'}</div><h2>${perfect?'완벽한 감식자':'생환한 감식자'}</h2><p>${perfect?'오답 없이 전 단계를 통과했습니다.':'실수가 있었지만 끝까지 통과했습니다.'}</p><div class="result-card"><div class="row"><span>진행 결과</span><b>${max}/${max}</b></div><div class="row"><span>오답 횟수</span><b>${mistakes}회</b></div><div class="row"><span>완료 시각</span><b>${time}</b></div></div><button class="primary" id="restartBtn">처음부터 다시 시작</button>`;document.getElementById('restartBtn').onclick=()=>{stage=1;mistakes=0;startStage()}}
function drawBg(t){let g=ctx.createLinearGradient(0,0,0,720);g.addColorStop(0,'#263247');g.addColorStop(.55,'#171c24');g.addColorStop(1,'#0b0f15');ctx.fillStyle=g;ctx.fillRect(0,0,1280,720);ctx.fillStyle='#111720';ctx.fillRect(0,95,1280,455);
for(let x=40;x<1240;x+=205){ctx.fillStyle='#1b2430';ctx.fillRect(x,150,150,330);ctx.strokeStyle='#394453';ctx.lineWidth=5;ctx.strokeRect(x,150,150,330);for(let y=205;y<455;y+=80){ctx.fillStyle='#4b3526';ctx.fillRect(x+12,y,126,18)}}
ctx.fillStyle='#2c241e';ctx.fillRect(0,545,1280,175);ctx.strokeStyle='#554333';ctx.lineWidth=2;for(let y=565;y<720;y+=34){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(1280,y);ctx.stroke()}for(let x=0;x<1280;x+=90){ctx.beginPath();ctx.moveTo(x,545);ctx.lineTo(x+20,720);ctx.stroke()}
const glow=ctx.createRadialGradient(640,360,10,640,360,430);glow.addColorStop(0,'rgba(60,120,220,.16)');glow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=glow;ctx.fillRect(0,0,1280,720);
for(let i=0;i<32;i++){const x=(i*87+t*.02)%1320-20,y=150+(i*47)%430;ctx.fillStyle=`rgba(160,205,255,${.05+(i%4)*.025})`;ctx.beginPath();ctx.arc(x,y,1+(i%3),0,7);ctx.fill()}
const vg=ctx.createRadialGradient(640,360,140,640,360,760);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.5)');ctx.fillStyle=vg;ctx.fillRect(0,0,1280,720)}
function drawObstacle(o,t){const img=obsImages[o.type];if(!img||!img.complete)return;ctx.save();if(o.type==='magic'){const pulse=.75+.18*Math.sin(t*.004+o.phase);ctx.globalAlpha=.72;ctx.translate(o.x+o.w/2,o.y+o.h/2);ctx.scale(pulse,pulse);ctx.rotate(t*.0004);ctx.drawImage(img,-o.w/2,-o.h/2,o.w,o.h)}else{ctx.shadowColor='#000';ctx.shadowBlur=18;ctx.drawImage(img,o.x,o.y,o.w,o.h)}ctx.restore()}
function inside(sp,o){return sp.x>o.x-18&&sp.x<o.x+o.w+18&&sp.y>o.y-18&&sp.y<o.y+o.h+18}
function separate(minDist){for(let i=0;i<sprites.length;i++)for(let j=i+1;j<sprites.length;j++){const a=sprites[i],b=sprites[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;if(d<minDist){const f=(minDist-d)*.02,nx=dx/d,ny=dy/d;a.x-=nx*f;b.x+=nx*f;a.y-=ny*f*.35;b.y+=ny*f*.35}}}
function drawSprite(sp,t){const img=images[sp.item.file];if(!img||!img.complete)return;let hidden=false;for(const o of obstacles)if(inside(sp,o)){hidden=true;break}const size=62*sp.scale;ctx.save();ctx.translate(sp.x,sp.y+Math.sin(t*.003+sp.phase)*5);ctx.rotate(sp.rot);ctx.globalAlpha=hidden?.22:1;ctx.shadowColor='#000';ctx.shadowBlur=18;ctx.drawImage(img,-size,-size,size*2,size*2);ctx.restore()}
function update(t,dt){if(state!=='observe')return;const c=cfg();separate(c.minDist);for(const sp of sprites){sp.x+=sp.vx*sp.dir*c.speed*dt*.06;sp.rot+=sp.vr*dt*.05;sp.turn-=dt/1000;if(sp.turn<0){if(Math.random()<.4)sp.dir*=-1;sp.turn=rnd(1,3)}if(sp.x<-80){sp.x=-80;sp.dir=1}if(sp.x>1360){sp.x=1360;sp.dir=-1}}
const left=c.time-(t-observeStart)/1000;if(left<.8){for(const sp of sprites){for(const o of obstacles)if(inside(sp,o)){sp.x+=(sp.x<o.x+o.w/2?-1:1)*dt*.16;sp.y+=(sp.y<o.y+o.h/2?-1:1)*dt*.05}}}
timerEl.textContent=Math.max(0,left).toFixed(1);if(left<=0)ask()}
function render(t){drawBg(t);[...sprites].sort((a,b)=>a.y-b.y).forEach(sp=>drawSprite(sp,t));obstacles.filter(o=>o.type!=='magic').forEach(o=>drawObstacle(o,t));obstacles.filter(o=>o.type==='magic').forEach(o=>drawObstacle(o,t));if(state==='question'&&currentRound&&currentRound.mode==='exist'){ctx.save();ctx.fillStyle='rgba(2,4,8,.86)';ctx.fillRect(0,0,canvas.width,canvas.height);const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,60,canvas.width/2,canvas.height/2,420);g.addColorStop(0,'rgba(255,255,255,.03)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore()}}
function loop(t){const dt=Math.min(34,t-last);last=t;update(t,dt);render(t);requestAnimationFrame(loop)}
intro();requestAnimationFrame(loop);
</script>
</body></html>
